<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Seizure Log">
<meta name="theme-color" content="#0f1117">
<title>Seizure Log</title>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #181c27;
    --bg3: #1f2435;
    --border: #2a2f42;
    --text: #eef0f6;
    --text2: #8b90a8;
    --text3: #555b73;
    --accent: #6c8ef5;
    --accent-dim: #1e2a4a;
    --green: #4caf80;
    --green-dim: #13301f;
    --amber: #e8a838;
    --amber-dim: #362408;
    --red: #e85858;
    --red-dim: #3a1010;
    --radius: 14px;
    --radius-sm: 8px;
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overscroll-behavior: none; }

  /* NAV */
  .nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15,17,23,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; padding-bottom: var(--safe-bottom); z-index: 50; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 0 8px; cursor: pointer; background: none; border: none; color: var(--text3); font-size: 10px; font-family: var(--font); letter-spacing: 0.3px; transition: color 0.15s; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; }

  /* PAGES */
  .page { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; overflow-y: auto; padding-top: calc(var(--safe-top) + 56px); padding-bottom: calc(var(--safe-bottom) + 68px); }
  .page.active { display: block; }

  /* HEADER */
  .header { position: fixed; top: 0; left: 0; right: 0; z-index: 40; background: rgba(15,17,23,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: calc(var(--safe-top) + 14px) 20px 14px; display: flex; align-items: center; justify-content: space-between; }
  .header-title { font-size: 17px; font-weight: 600; }
  .header-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }

  /* CONTENT */
  .content { padding: 16px 16px 0; }

  /* CARDS */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 12px; }

  /* FORM */
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  .field label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 6px; }
  .field input, .field select, .field textarea {
    width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); font-size: 15px; font-family: var(--font); padding: 11px 13px; outline: none;
    -webkit-appearance: none; appearance: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { min-height: 72px; resize: none; line-height: 1.5; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* SEVERITY */
  .sev-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .sev-btn { padding: 10px 0; text-align: center; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg3); color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .sev-btn.active-mild { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .sev-btn.active-moderate { background: var(--amber-dim); border-color: var(--amber); color: var(--amber); }
  .sev-btn.active-severe { background: var(--red-dim); border-color: var(--red); color: var(--red); }

  /* TAGS */
  .tags { display: flex; flex-wrap: wrap; gap: 7px; }
  .tag { padding: 6px 12px; border-radius: 99px; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); font-size: 13px; cursor: pointer; transition: all 0.15s; user-select: none; }
  .tag.sel { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  /* BUTTONS */
  .btn { display: flex; align-items: center; justify-content: center; gap: 7px; padding: 13px; border-radius: var(--radius-sm); border: none; font-size: 15px; font-weight: 600; font-family: var(--font); cursor: pointer; width: 100%; transition: opacity 0.15s; }
  .btn:active { opacity: 0.75; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* ENTRIES */
  .entry { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
  .entry-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .entry-date { font-size: 15px; font-weight: 600; }
  .entry-time { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .entry-meta { font-size: 12px; color: var(--text3); margin-top: 5px; }
  .badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 99px; font-size: 11px; font-weight: 600; }
  .badge-mild { background: var(--green-dim); color: var(--green); }
  .badge-moderate { background: var(--amber-dim); color: var(--amber); }
  .badge-severe { background: var(--red-dim); color: var(--red); }
  .entry-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 9px; }
  .chip { padding: 3px 9px; border-radius: 99px; font-size: 11px; background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
  .chip-post { background: var(--amber-dim); color: var(--amber); border-color: transparent; }
  .entry-notes { font-size: 13px; color: var(--text2); margin-top: 8px; line-height: 1.5; font-style: italic; }
  .del-btn { background: none; border: none; color: var(--text3); cursor: pointer; padding: 4px; flex-shrink: 0; }
  .del-btn:active { color: var(--red); }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .stat { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
  .stat-val { font-size: 30px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-label { font-size: 12px; color: var(--text2); margin-top: 4px; }

  /* SUMMARY */
  .summary-pre { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; font-size: 12px; line-height: 1.8; color: var(--text2); white-space: pre-wrap; font-family: 'SF Mono', monospace; margin-bottom: 12px; max-height: 50vh; overflow-y: auto; }
  .name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }

  /* EMPTY */
  .empty { text-align: center; padding: 48px 20px; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 15px; line-height: 1.6; }

  /* LOADING / TOAST */
  .toast { position: fixed; bottom: calc(var(--safe-bottom) + 80px); left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 99px; font-size: 14px; font-weight: 500; z-index: 200; pointer-events: none; opacity: 0; transition: opacity 0.2s; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SECTION SEP */
  .sep { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; margin: 18px 0 8px; padding: 0 2px; }

  .pill-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
  .pill-row::-webkit-scrollbar { display: none; }
  .pill { padding: 6px 14px; border-radius: 99px; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); font-size: 13px; white-space: nowrap; cursor: pointer; }
  .pill.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .logged-by { font-size: 11px; color: var(--text3); margin-top: 4px; }


  .med-row-inner { padding: 4px 0; }
  .med-pills { display: flex; flex-wrap: wrap; gap: 7px; }
  .med-row .med-divider:last-of-type { display: none; }


  /* CHARTS */
  .chart-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .chart-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 14px; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .bar-label { font-size: 12px; color: var(--text2); width: 80px; flex-shrink: 0; text-align: right; }
  .bar-track { flex: 1; background: var(--bg3); border-radius: 99px; height: 20px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 99px; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; font-size: 11px; font-weight: 600; color: #fff; min-width: 24px; transition: width 0.4s ease; }
  .bar-fill.c1 { background: var(--accent); }
  .bar-fill.c2 { background: var(--green); }
  .bar-fill.c3 { background: var(--amber); }
  .bar-fill.c4 { background: #a78bfa; }
  .day-grid { display: flex; flex-direction: column; gap: 6px; }
  .day-row { display: flex; align-items: center; gap: 10px; }
  .day-label { font-size: 12px; color: var(--text2); width: 90px; flex-shrink: 0; }
  .day-dots { display: flex; flex-wrap: wrap; gap: 4px; }
  .day-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); opacity: 0.85; }

  /* DATE FILTER */
  .date-filter { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
  .date-filter input { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; font-family: var(--font); padding: 8px 11px; outline: none; }
  .date-filter input:focus { border-color: var(--accent); }
  .date-filter-sep { font-size: 13px; color: var(--text3); flex-shrink: 0; }
  .clear-filter { font-size: 12px; color: var(--accent); background: none; border: none; cursor: pointer; padding: 0; white-space: nowrap; }

  .who-input { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 15px; font-family: var(--font); padding: 10px 13px; outline: none; width: 100%; }
  .who-input:focus { border-color: var(--accent); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>
    <div class="header-title" id="page-title">Log a Seizure</div>
    <div class="header-sub" id="sync-status">Connecting…</div>
  </div>
  <div id="header-action"></div>
</div>

<!-- PAGES -->

<!-- LOG PAGE -->
<div class="page active" id="page-log">
  <div class="content">
    <div class="card">
      <div class="card-title">Who is logging?</div>
      <div class="sev-row" style="margin-bottom:10px">
        <div class="sev-btn" data-who="Mom" onclick="setLogger(this)">Mom</div>
        <div class="sev-btn" data-who="Dad" onclick="setLogger(this)">Dad</div>
        <div class="sev-btn" data-who="Other" onclick="setLogger(this)">Other</div>
      </div>
      <input class="who-input" id="logger-name" placeholder="Or type a name…" value="" oninput="syncLoggerInput(this.value)">
    </div>

    <div class="card">
      <div class="card-title">When</div>
      <div class="row2">
        <div class="field" style="margin:0"><label>Date</label><input type="date" id="s-date"></div>
        <div class="field" style="margin:0"><label>Time</label><input type="time" id="s-time"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Seizure details</div>
      <div class="field">
        <label>Duration</label>
        <div class="row2">
          <div style="position:relative">
            <input type="number" id="s-dur-min" placeholder="0" min="0" max="99" inputmode="numeric" style="padding-right:36px">
            <span style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text3);pointer-events:none">min</span>
          </div>
          <div style="position:relative">
            <input type="number" id="s-dur-sec" placeholder="0" min="0" max="59" inputmode="numeric" style="padding-right:36px">
            <span style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text3);pointer-events:none">sec</span>
          </div>
        </div>
      </div>
      <div class="field" style="margin-bottom:0"><label>Seizure type</label>
        <select id="s-type">
          <option value="">— select type —</option>
          <option>Absence</option>
          <option>Focal aware</option>
          <option>Focal impaired awareness</option>
          <option>Tonic-clonic (grand mal)</option>
          <option>Myoclonic</option>
          <option>Tonic</option>
          <option>Atonic (drop)</option>
          <option>Unknown / unclassified</option>
        </select>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Severity</div>
      <div class="sev-row">
        <div class="sev-btn" data-sev="mild" onclick="setSev(this)">Mild</div>
        <div class="sev-btn" data-sev="moderate" onclick="setSev(this)">Moderate</div>
        <div class="sev-btn" data-sev="severe" onclick="setSev(this)">Severe</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Symptoms during seizure</div>
      <div class="tags" id="symptom-tags"></div>
    </div>

    <div class="card">
      <div class="card-title">After the seizure (postictal)</div>
      <div class="tags" id="postictal-tags"></div>
    </div>

    <div class="card">
      <div class="card-title">Possible triggers</div>
      <div class="tags" id="trigger-tags"></div>
    </div>

    <div class="card">
      <div class="card-title">Medications given</div>
      <div id="med-rows"></div>
      <button class="btn btn-ghost" style="margin-top:10px;font-size:13px;padding:9px" onclick="addMedRow()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add medication
      </button>
    </div>

    <div class="card">
      <div class="card-title">Notes</div>
      <textarea id="s-notes" placeholder="Anything else — context, how she seemed…"></textarea>
    </div>

    <div style="margin-bottom:8px">
      <button class="btn btn-primary" id="save-btn" onclick="saveEntry()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>
        Save Entry
      </button>
    </div>
    <div style="margin-bottom:24px">
      <button class="btn btn-ghost" onclick="clearForm()">Clear form</button>
    </div>
  </div>
</div>

<!-- HISTORY PAGE -->
<div class="page" id="page-history">
  <div class="content">
    <div class="stats-grid" id="stats-grid" style="display:none"></div>
    <div class="pill-row" id="filter-pills" style="display:none; margin-bottom:12px"></div>
    <div class="date-filter" id="date-filter-row" style="display:none">
      <input type="date" id="filter-from" onchange="renderHistory()">
      <span class="date-filter-sep">to</span>
      <input type="date" id="filter-to" onchange="renderHistory()">
      <button class="clear-filter" onclick="clearDateFilter()">Clear</button>
    </div>
    <div id="history-list"><div class="empty"><div class="empty-icon">📋</div><p>Loading entries…</p></div></div>
  </div>
</div>

<!-- SUMMARY PAGE -->
<div class="page" id="page-summary">
  <div class="content">
    <div class="card">
      <div class="card-title">Patient info</div>
      <div class="name-row">
        <input class="who-input" id="sum-name" placeholder="Patient name">
        <input class="who-input" id="sum-dob" placeholder="Date of birth">
      </div>
      <div class="field" style="margin-bottom:0"><label>Period to cover</label>
        <select id="sum-period" onchange="renderSummary()">
          <option value="30">Last 30 days</option>
          <option value="60">Last 60 days</option>
          <option value="90">Last 90 days</option>
          <option value="all">All time</option>
        </select>
      </div>
    </div>
    <div id="summary-out"></div>
    <button class="btn btn-primary" id="gen-btn" onclick="generateSummary()">Generate Summary</button>
    <div style="margin-top:10px; margin-bottom:24px" id="copy-btn-wrap" style="display:none">
      <button class="btn btn-ghost" onclick="copySummary()">Copy to clipboard</button>
    </div>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" id="nav-log" onclick="showPage('log')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Log
  </button>
  <button class="nav-btn" id="nav-history" onclick="showPage('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    History
  </button>
  <button class="nav-btn" id="nav-summary" onclick="showPage('summary')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/></svg>
    Summary
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby6JhUjFr7_5JW1J-tMS4XCiyHDQMsJ6Tgez_gbSJW2ieYfCkyql3lJA1tTecz160wi/exec';

const SYMPTOMS = ['Staring/blank','Eye deviation','Eye blinking','Head turn','Lip smacking','Arm jerking','Leg jerking','Body stiffening','Limpness','Drooling','Color change','Crying out','Loss of awareness','Fell down','Incontinence','DSAT'];
const POSTICTAL = ['Confused','Sleepy/tired','Headache','No memory','Crying','Back to normal quickly','Vomited'];
const TRIGGERS  = ['Tired/sleep deprived','Fever/illness','Missed medication','Flickering lights','Stress','Exercise','Cluster','Back to Back','Unknown'];

let entries = [];
let severity = '';
let currentFilter = 'all';
let summaryText = '';

// ── INIT ──────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  setNow();
  buildTags('symptom-tags', SYMPTOMS);
  buildTags('postictal-tags', POSTICTAL);
  buildTags('trigger-tags', TRIGGERS);
  const saved = localStorage.getItem('sz_logger');
  if (saved) {
    document.getElementById('logger-name').value = saved;
    document.querySelectorAll('.sev-btn[data-who]').forEach(b => {
      if (b.dataset.who === saved) b.classList.add('active-mild');
    });
  }
  loadEntries();
});

// ── API ───────────────────────────────────────────────────────────────
async function api(params) {
  const url = SCRIPT_URL + '?' + new URLSearchParams(params);
  const res = await fetch(url);
  return res.json();
}

async function loadEntries() {
  setSyncStatus('Syncing…');
  try {
    const data = await api({ action: 'list' });
    entries = (data || []).map(normalizeEntry).sort((a,b) => parseLocal(b.Date, b.Time) - parseLocal(a.Date, a.Time));
    setSyncStatus(`${entries.length} entries · ${fmt12(new Date())}`);
    renderHistory();
  } catch(e) {
    setSyncStatus('Offline — check connection');
  }
}

function normalizeEntry(r) {
  return {
    ID: r.ID || r.id || '',
    Date: toISODate(r.Date || r.date || ''),
    Time: r.Time || r.time || '',
    Duration: cleanDuration(r.Duration || r.duration || ''),
    Type: r.Type || r.type || '',
    Severity: r.Severity || r.severity || '',
    Symptoms: r.Symptoms || r.symptoms || '',
    Postictal: r.Postictal || r.postictal || '',
    Triggers: r.Triggers || r.triggers || '',
    Notes: r.Notes || r.notes || '',
    LoggedBy: r.LoggedBy || r.loggedBy || '',
    Medications: r.Medications || r.medications || '',
    CreatedAt: r.CreatedAt || r.createdAt || ''
  };
}

async function saveEntry() {
  const date = document.getElementById('s-date').value;
  if (!date) { showToast('Please enter a date'); return; }

  const loggerName = document.getElementById('logger-name').value.trim();
  if (loggerName) localStorage.setItem('sz_logger', loggerName);

  const btn = document.getElementById('save-btn');
  btn.innerHTML = '<span class="spinner"></span> Saving…';
  btn.disabled = true;

  const entry = {
    ID: Date.now().toString(),
    Date: date,
    Time: document.getElementById('s-time').value,
    Duration: buildDuration(),
    Type: document.getElementById('s-type').value,
    Severity: severity,
    Symptoms: getSelected('symptom-tags').join('; '),
    Postictal: getSelected('postictal-tags').join('; '),
    Triggers: getSelected('trigger-tags').join('; '),
    Notes: document.getElementById('s-notes').value.trim(),
    Medications: buildMedications(),
    LoggedBy: loggerName,
    CreatedAt: new Date().toISOString()
  };

  try {
    await api({ action: 'add', entry: JSON.stringify(entry) });
    showToast('Entry saved ✓');
    clearForm();
    await loadEntries();
  } catch(e) {
    showToast('Save failed — check connection');
  } finally {
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg> Save Entry';
    btn.disabled = false;
  }
}

async function deleteEntry(id) {
  if (!confirm('Delete this entry?')) return;
  try {
    await api({ action: 'delete', id });
    showToast('Deleted');
    await loadEntries();
  } catch(e) {
    showToast('Delete failed');
  }
}

function clearDateFilter() {
  document.getElementById('filter-from').value = '';
  document.getElementById('filter-to').value = '';
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');

  if (!entries.length) {
    document.getElementById('stats-grid').style.display = 'none';
    document.getElementById('filter-pills').style.display = 'none';
    document.getElementById('date-filter-row').style.display = 'none';
    list.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><p>No seizures logged yet.<br>Tap Log to add the first entry.</p></div>';
    return;
  }

  // stats
  const last30 = entries.filter(e => parseLocal(e.Date) >= daysAgo(30));
  const sevMap = countBy(entries, 'Severity');
  document.getElementById('stats-grid').style.display = '';
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat"><div class="stat-val">${entries.length}</div><div class="stat-label">Total events</div></div>
    <div class="stat"><div class="stat-val">${last30.length}</div><div class="stat-label">Last 30 days</div></div>
    <div class="stat"><div class="stat-val" style="font-size:18px;padding-top:4px">${topKey(countBy(entries,'Type')) || '—'}</div><div class="stat-label">Most common type</div></div>
    <div class="stat"><div class="stat-val" style="font-size:18px;padding-top:4px">${topKey(sevMap) || '—'}</div><div class="stat-label">Typical severity</div></div>
  `;

  // month pills
  const months = [...new Set(entries.map(e=>e.Date.slice(0,7)))].sort().reverse();
  const pills = document.getElementById('filter-pills');
  pills.style.display = '';
  pills.innerHTML = ['all',...months].map(m => {
    const lbl = m === 'all' ? 'All' : fmtMonth(m);
    return `<div class="pill ${currentFilter===m?'active':''}" onclick="setFilter('${m}')">${lbl}</div>`;
  }).join('');

  // date range filter
  document.getElementById('date-filter-row').style.display = '';
  const fromVal = document.getElementById('filter-from').value;
  const toVal   = document.getElementById('filter-to').value;
  const fromDate = fromVal ? new Date(fromVal + 'T00:00:00') : null;
  const toDate   = toVal   ? new Date(toVal   + 'T23:59:59') : null;

  // apply filters
  let filtered = entries;
  if (currentFilter !== 'all') filtered = filtered.filter(e=>e.Date.startsWith(currentFilter));
  if (fromDate) filtered = filtered.filter(e => parseLocal(e.Date) >= fromDate);
  if (toDate)   filtered = filtered.filter(e => parseLocal(e.Date) <= toDate);

  if (!filtered.length) {
    list.innerHTML = '<div class="empty"><p>No entries for this period.</p></div>';
    return;
  }

  const isFiltered = currentFilter !== 'all' || fromDate || toDate;
  const countBanner = isFiltered
    ? `<div style="font-size:13px;color:var(--text2);margin-bottom:10px;padding:10px 14px;background:var(--accent-dim);border:1px solid var(--accent);border-radius:var(--radius-sm)">
        <span style="font-weight:600;color:var(--accent)">${filtered.length}</span> event${filtered.length !== 1 ? 's' : ''} in selected range
       </div>`
    : '';

  list.innerHTML = countBanner + filtered.map(e => {
    const syms = e.Symptoms ? e.Symptoms.split('; ').filter(Boolean) : [];
    const post = e.Postictal ? e.Postictal.split('; ').filter(Boolean) : [];
    const badge = e.Severity ? `<span class="badge badge-${e.Severity}">${e.Severity}</span>` : '';
    const chips = [...syms.map(s=>`<span class="chip">${s}</span>`), ...post.map(s=>`<span class="chip chip-post">${s}</span>`)].join('');
    return `
    <div class="entry">
      <div class="entry-top">
        <div>
          <div class="entry-date">${fmtDate(e.Date)}</div>
          <div class="entry-time">${e.Time ? fmt12Time(e.Time) : ''}${e.Duration ? ' · ' + e.Duration : ''}</div>
          ${e.Type ? `<div class="entry-meta">${e.Type}</div>` : ''}
          ${e.LoggedBy ? `<div class="logged-by">Logged by ${e.LoggedBy}</div>` : ''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          ${badge}
          <button class="del-btn" onclick="deleteEntry('${e.ID}')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14H6L5,6"/><path d="M10,11v6"/><path d="M14,11v6"/></svg>
          </button>
        </div>
      </div>
      ${chips ? `<div class="entry-chips">${chips}</div>` : ''}
      ${e.Medications ? `<div class="entry-notes" style="font-style:normal"><span style="color:var(--text3);font-size:11px">MED </span>${e.Medications}</div>` : ''}
      ${e.Notes ? `<div class="entry-notes">${e.Notes}</div>` : ''}
    </div>`;
  }).join('');
}

function setFilter(m) {
  currentFilter = m;
  renderHistory();
}

// ── SUMMARY ───────────────────────────────────────────────────────────
function generateSummary() {
  const period = document.getElementById('sum-period').value;
  const name = document.getElementById('sum-name').value || '[Patient name]';
  const dob  = document.getElementById('sum-dob').value  || '[DOB]';

  let data = entries;
  let rangeLabel = 'All time';
  if (period !== 'all') {
    const cutoff = daysAgo(parseInt(period));
    data = entries.filter(e => parseLocal(e.Date) >= cutoff);
    rangeLabel = `Last ${period} days (${fmtDate(cutoff.toISOString().split('T')[0])} – ${fmtDate(new Date().toISOString().split('T')[0])})`;
  }

  if (!data.length) {
    document.getElementById('summary-out').innerHTML = '<div class="empty"><p>No entries for this period.</p></div>';
    document.getElementById('copy-btn-wrap').style.display = 'none';
    return;
  }

  const sorted = [...data].sort((a,b)=>parseLocal(a.Date,a.Time)-parseLocal(b.Date,b.Time));
  const typeMap = countBy(data,'Type');
  const sevMap  = countBy(data,'Severity');
  const symMap  = countByArr(data,'Symptoms');
  const trigMap = countByArr(data,'Triggers');
  const postMap = countByArr(data,'Postictal');

  let t = `SEIZURE LOG SUMMARY\n${'─'.repeat(38)}\n`;
  t += `Patient:  ${name}\nDOB:      ${dob}\nGenerated: ${fmtDate(new Date().toISOString().split('T')[0])}\nPeriod:   ${rangeLabel}\n\n`;
  t += `OVERVIEW\n${'─'.repeat(38)}\n`;
  t += `Total seizures: ${data.length}\n`;
  t += `First: ${fmtDate(sorted[0].Date)}${sorted[0].Time?' at '+fmt12Time(sorted[0].Time):''}\n`;
  t += `Most recent: ${fmtDate(sorted[sorted.length-1].Date)}${sorted[sorted.length-1].Time?' at '+fmt12Time(sorted[sorted.length-1].Time):''}\n\n`;

  if (Object.keys(typeMap).length) {
    t += `SEIZURE TYPES\n${'─'.repeat(38)}\n`;
    Object.entries(typeMap).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>t+=`  ${k}: ${v}\n`);
    t += '\n';
  }
  if (Object.keys(sevMap).length) {
    t += `SEVERITY\n${'─'.repeat(38)}\n`;
    ['severe','moderate','mild'].forEach(s=>{if(sevMap[s])t+=`  ${cap(s)}: ${sevMap[s]}\n`;});
    t += '\n';
  }
  if (Object.keys(symMap).length) {
    t += `COMMON SYMPTOMS\n${'─'.repeat(38)}\n`;
    Object.entries(symMap).sort((a,b)=>b[1]-a[1]).slice(0,6).forEach(([k,v])=>t+=`  ${k}: ${v}x\n`);
    t += '\n';
  }
  if (Object.keys(postMap).length) {
    t += `POSTICTAL PATTERNS\n${'─'.repeat(38)}\n`;
    Object.entries(postMap).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>t+=`  ${k}: ${v}x\n`);
    t += '\n';
  }
  if (Object.keys(trigMap).length) {
    t += `POSSIBLE TRIGGERS\n${'─'.repeat(38)}\n`;
    Object.entries(trigMap).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>t+=`  ${k}: ${v}x\n`);
    t += '\n';
  }
  t += `INDIVIDUAL EVENTS\n${'─'.repeat(38)}\n`;
  sorted.forEach((e,i)=>{
    t += `\n${i+1}. ${fmtDate(e.Date)}${e.Time?' at '+fmt12Time(e.Time):''}\n`;
    if(e.Duration) t+=`   Duration: ${e.Duration}\n`;
    if(e.Type) t+=`   Type: ${e.Type}\n`;
    if(e.Severity) t+=`   Severity: ${e.Severity}\n`;
    if(e.Symptoms) t+=`   Symptoms: ${e.Symptoms}\n`;
    if(e.Postictal) t+=`   Postictal: ${e.Postictal}\n`;
    if(e.Triggers) t+=`   Triggers: ${e.Triggers}\n`;
    if(e.Medications) t+=`   Medications: ${e.Medications}\n`;
    if(e.Notes) t+=`   Notes: ${e.Notes}\n`;
    if(e.LoggedBy) t+=`   Logged by: ${e.LoggedBy}\n`;
  });

  summaryText = t;

  // ── CHARTS ────────────────────────────────────────────────────────
  // Duration buckets
  const durBuckets = {'0–30s': 0, '31s–1m': 0, '1m–2m': 0, '2m–5m': 0, '5m+': 0, 'Unknown': 0};
  data.forEach(e => {
    const secs = parseDurToSecs(e.Duration);
    if (secs === null) durBuckets['Unknown']++;
    else if (secs <= 30) durBuckets['0–30s']++;
    else if (secs <= 60) durBuckets['31s–1m']++;
    else if (secs <= 120) durBuckets['1m–2m']++;
    else if (secs <= 300) durBuckets['2m–5m']++;
    else durBuckets['5m+']++;
  });
  const durMax = Math.max(1, ...Object.values(durBuckets));
  const durColors = ['c1','c2','c3','c4','c1','c2'];
  const durChart = Object.entries(durBuckets).map(([lbl, cnt], i) => cnt > 0 ? `
    <div class="bar-row">
      <div class="bar-label">${lbl}</div>
      <div class="bar-track">
        <div class="bar-fill ${durColors[i]}" style="width:${Math.round(cnt/durMax*100)}%">${cnt}</div>
      </div>
    </div>` : '').join('');

  // Duration bucket definitions with colors
  const DUR_BUCKETS = [
    { key: '0–30s',   label: '0–30s',   color: '#6c8ef5', test: s => s !== null && s <= 30 },
    { key: '31s–1m',  label: '31s–1m',  color: '#4caf80', test: s => s !== null && s > 30 && s <= 60 },
    { key: '1m–2m',   label: '1m–2m',   color: '#e8a838', test: s => s !== null && s > 60 && s <= 120 },
    { key: '2m–5m',   label: '2m–5m',   color: '#a78bfa', test: s => s !== null && s > 120 && s <= 300 },
    { key: '5m+',     label: '5m+',     color: '#e85858', test: s => s !== null && s > 300 },
    { key: 'Unknown', label: '?',        color: '#555b73', test: s => s === null },
  ];

  // Daily seizure count grouped by duration bucket
  const dayBucketMap = {}; // date -> { bucketKey -> count }
  data.forEach(e => {
    const secs = parseDurToSecs(e.Duration);
    const bucket = DUR_BUCKETS.find(b => b.test(secs)) || DUR_BUCKETS[5];
    if (!dayBucketMap[e.Date]) dayBucketMap[e.Date] = {};
    dayBucketMap[e.Date][bucket.key] = (dayBucketMap[e.Date][bucket.key] || 0) + 1;
  });
  const dayEntries = Object.entries(dayBucketMap).sort((a,b)=>a[0].localeCompare(b[0]));
  const dayTotals = dayEntries.map(([,bmap]) => Object.values(bmap).reduce((a,v)=>a+v,0));
  const dayMax = Math.max(1, ...dayTotals);

  // Legend HTML
  const legendHtml = DUR_BUCKETS.filter(b => data.some(e => {
    const s = parseDurToSecs(e.Duration); return b.test(s);
  })).map(b =>
    `<span style="display:inline-flex;align-items:center;gap:4px;margin-right:12px;font-size:11px;color:var(--text2)">
      <span style="width:10px;height:10px;border-radius:2px;background:${b.color};flex-shrink:0"></span>${b.label}
    </span>`
  ).join('');

  // Stacked bar per day
  const dailyChart = dayEntries.map(([date, bmap], i) => {
    const total = dayTotals[i];
    const totalPct = Math.round(total / dayMax * 100);
    const segments = DUR_BUCKETS.map(b => {
      const cnt = bmap[b.key] || 0;
      if (!cnt) return '';
      const pct = Math.round(cnt / total * 100);
      return `<div style="width:${pct}%;background:${b.color};height:100%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;min-width:${cnt > 0 ? '18px' : '0'}">${cnt}</div>`;
    }).join('');
    return `
    <div class="day-row" style="margin-bottom:6px">
      <div class="day-label">${fmtDateShort(date)}</div>
      <div style="flex:1">
        <div style="display:flex;height:20px;border-radius:4px;overflow:hidden;width:${totalPct}%;min-width:24px;background:var(--bg3)">
          ${segments}
        </div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">${total} total</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('summary-out').innerHTML =
    `<div class="chart-wrap"><div class="chart-title">Seizures by duration</div>${durChart || '<p style="color:var(--text3);font-size:13px">No duration data</p>'}</div>` +
    `<div class="chart-wrap">
      <div class="chart-title">Seizures per day</div>
      <div style="margin-bottom:12px;line-height:2">${legendHtml}</div>
      <div class="day-grid">${dailyChart || '<p style="color:var(--text3);font-size:13px">No data</p>'}</div>
    </div>` +
    `<div class="summary-pre">${t}</div>`;

  document.getElementById('copy-btn-wrap').style.display = '';
  document.getElementById('gen-btn').textContent = 'Regenerate';

  const copyWrap = document.getElementById('copy-btn-wrap');
  if (!copyWrap.querySelector('button')) {
    copyWrap.innerHTML = '<button class="btn btn-ghost" onclick="copySummary()">Copy to clipboard</button>';
  }
}

function copySummary() {
  if (!summaryText) return;
  navigator.clipboard.writeText(summaryText).then(()=>showToast('Copied ✓')).catch(()=>{
    // fallback
    const ta = document.createElement('textarea');
    ta.value = summaryText; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('Copied ✓');
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function cleanDuration(d) {
  if (!d) return '';
  d = String(d).trim();
  // If Sheets returned a time serial as string like "1:06:00" or "0:45:00"
  var m = d.match(/^(\d+):(\d{2})(?::(\d{2}))?$/);
  if (m) {
    var mins = parseInt(m[1]);
    var secs = parseInt(m[2]);
    // m[3] would be seconds if HH:MM:SS — in that case m[1]=hours, m[2]=mins, m[3]=secs
    if (m[3] !== undefined) {
      mins = parseInt(m[1]) * 60 + parseInt(m[2]);
      secs = parseInt(m[3]);
    }
    if (mins > 0 && secs > 0) return mins + 'm ' + secs + 's';
    if (mins > 0) return mins + 'm';
    if (secs > 0) return secs + 's';
    return '';
  }
  return d;
}
function toISODate(d) {
  if (!d) return '';
  d = String(d).trim();
  if (/^\d{4}-\d{2}-\d{2}/.test(d)) return d.slice(0, 10);
  if (/^\d{1,2}\/\d{1,2}\/\d{4}/.test(d)) {
    const [m, day, y] = d.split('/');
    return y + '-' + m.padStart(2,'0') + '-' + day.padStart(2,'0');
  }
  return d;
}
function parseLocal(date, time) {
  if (!date) return new Date(0);
  return new Date(toISODate(date) + 'T' + (time || '12:00') + ':00');
}
function fmtDate(d) {
  const iso = toISODate(d);
  if (!iso) return '';
  const dt = new Date(iso + 'T12:00:00');
  if (isNaN(dt)) return String(d);
  return dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
}
function fmt12Time(t) {
  const [h,m] = t.split(':'); const hh=parseInt(h);
  return `${hh%12||12}:${m} ${hh<12?'AM':'PM'}`;
}
function fmt12(d) { return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }
function fmtMonth(m) { const [y,mo]=m.split('-'); return new Date(y,mo-1,1).toLocaleString('en-US',{month:'long',year:'numeric'}); }
function daysAgo(n) { const d=new Date(); d.setDate(d.getDate()-n); return d; }
function countBy(arr,key) { return arr.reduce((a,e)=>{if(e[key])a[e[key]]=(a[e[key]]||0)+1;return a;},{}); }
function countByArr(arr,key) {
  return arr.reduce((a,e)=>{
    (e[key]||'').split('; ').filter(Boolean).forEach(v=>a[v]=(a[v]||0)+1);
    return a;
  },{});
}
function parseDurToSecs(d) {
  if (!d) return null;
  d = String(d).trim();
  // "1m 30s" or "1m" or "45s"
  const mMatch = d.match(/(\d+)m/);
  const sMatch = d.match(/(\d+)s/);
  if (!mMatch && !sMatch) return null;
  return (mMatch ? parseInt(mMatch[1]) * 60 : 0) + (sMatch ? parseInt(sMatch[1]) : 0);
}
function fmtDateShort(d) {
  const iso = toISODate(d);
  if (!iso) return d;
  const dt = new Date(iso + 'T12:00:00');
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function topKey(obj) { const e=Object.entries(obj).sort((a,b)=>b[1]-a[1])[0]; return e?e[0]:''; }
function cap(s) { return s.charAt(0).toUpperCase()+s.slice(1); }
